name: Build & Release Nova

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm install

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        run: curl -L "${{ secrets.VOSK_MODEL_URL }}" -o model.tar.gz

      - name: Build AppImage
        working-directory: robot-widget/frontend
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: nova-linux
          path: robot-widget/frontend/dist/Nova*.AppImage

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm install

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        shell: pwsh
        run: Invoke-WebRequest -Uri "${{ secrets.VOSK_MODEL_URL }}" -OutFile "model.tar.gz"

      - name: Build Windows installer
        working-directory: robot-widget/frontend
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ''
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: nova-windows
          path: robot-widget/frontend/dist/Nova*Setup*.exe

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm install

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        run: curl -L "${{ secrets.VOSK_MODEL_URL }}" -o model.tar.gz

      - name: Build macOS DMG
        working-directory: robot-widget/frontend
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: nova-mac
          path: robot-widget/frontend/dist/Nova*.dmg

  # ── Upload to existing GitHub Release ─────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: |
            dist/nova-linux/Nova*.AppImage
            dist/nova-windows/Nova*Setup*.exe
            dist/nova-mac/Nova*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
