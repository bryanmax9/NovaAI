name: Build & Release Nova

# Push a version tag to trigger builds for all three platforms.
# Example: git tag v1.0.0 && git push origin v1.0.0
#
# Required GitHub Secret:
#   VOSK_MODEL_URL — URL to your model.tar.gz (e.g. a GitHub Release asset
#                    or any direct download link to the 40MB vosk model file)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: robot-widget/frontend/package-lock.json

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm ci

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        run: curl -L "${{ secrets.VOSK_MODEL_URL }}" -o model.tar.gz

      - name: Build AppImage
        working-directory: robot-widget/frontend
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: nova-linux
          path: robot-widget/frontend/dist/Nova*.AppImage

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: robot-widget/frontend/package-lock.json

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm ci

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        shell: pwsh
        run: Invoke-WebRequest -Uri "${{ secrets.VOSK_MODEL_URL }}" -OutFile "model.tar.gz"

      - name: Build Windows installer
        working-directory: robot-widget/frontend
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: nova-windows
          path: robot-widget/frontend/dist/Nova*Setup*.exe

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: robot-widget/frontend/package-lock.json

      - name: Install dependencies
        working-directory: robot-widget/frontend
        run: npm ci

      - name: Download Vosk model
        working-directory: robot-widget/frontend
        run: curl -L "${{ secrets.VOSK_MODEL_URL }}" -o model.tar.gz

      - name: Build macOS DMG
        working-directory: robot-widget/frontend
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: nova-mac
          path: robot-widget/frontend/dist/Nova*.dmg

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nova ${{ github.ref_name }} — Early Access
          prerelease: true
          body: |
            ## Nova AI ${{ github.ref_name }}

            Voice-powered AI desktop assistant.

            | Platform | Download |
            |----------|---------|
            | Windows  | `Nova-Setup.exe` |
            | macOS    | `Nova.dmg` |
            | Linux    | `Nova.AppImage` |

            **Linux quick start:**
            ```bash
            chmod +x Nova*.AppImage
            ./Nova*.AppImage
            ```
          files: |
            dist/nova-linux/Nova*.AppImage
            dist/nova-windows/Nova*Setup*.exe
            dist/nova-mac/Nova*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
